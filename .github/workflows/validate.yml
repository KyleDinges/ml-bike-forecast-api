name: Validate bike demand forecast API

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m compileall -q bike_demand_api scripts tests
      - run: python -m scripts.verify_artifact
      - run: python -m pytest -q

  container:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag bike-demand-forecast-api:ci .
